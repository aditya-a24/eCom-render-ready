services:
  - type: web
    name: ecommerce-app
    runtime: docker           # Render builds and runs the Dockerfile
    dockerfilePath: ./Dockerfile
    dockerContext: .
    port: 8080                # Must match Tomcat's connector port (EXPOSE 8080)
    envVars:
      - key: DB_URL
        sync: false           # Set manually in Render dashboard — never commit credentials
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
    healthCheckPath: /
