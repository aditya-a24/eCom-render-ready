services:
  - type: web
    name: ecommerce-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    port: 8080

    # Health check — Render polls this path to decide if the service is "up".
    # "/" is handled by RootServlet which just forwards to index.jsp,
    # so a 200 back means Tomcat is fully deployed and serving JSPs.
    healthCheckPath: /

    envVars:
      # ── Database (FreeSQLDatabase) ─────────────────────────────────────────
      # Set these in the Render dashboard under Environment.
      # Format: jdbc:mysql://<host>:<port>/<dbname>?useSSL=true&serverTimezone=UTC
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
